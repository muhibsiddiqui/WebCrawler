<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crawl Results</title>
    <title>Web Crawler</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        label {
            text-align: left;
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: linear-gradient(to right, #764ba2, #667eea);
        }
        a {
            display: block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }
        a:hover {
            text-decoration: underline;
        }

        .links {
            margin-top: 20px;
            text-align: left;
        }
        .links ul {
            list-style-type: none;
            padding-left: 0;
        }
        .links li {
            margin: 10px 0;
        }
        .links a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
      
</head>
<body>
<div class="container">
    <h2>Enter a URL or Keyword to Crawl</h2>
    <form method="POST">
        <label>URL:</label> 
        <input type="text" name="url" placeholder="Enter website URL...">
        
        <label>Keyword:</label> 
        <input type="text" name="keyword" placeholder="Enter keyword...">

        <!-- <label for="depth">Crawl Depth (1 to 5):</label>
        <input type="number" id="depth" name="depth" min="1" max="5" value="1" required> -->
        
        <button type="submit">Crawl</button>

    </form>

    {% if links %}
    <div class="links">
        
    </div>
{% endif %}
    <a href="{{ url_for('dashboard') }}">← Go back to Dashboard</a>
</div>

<script>
    console.log("Crawler page active.");
</script>
</body>
</html>
